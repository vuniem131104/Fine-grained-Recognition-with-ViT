apiVersion: apps/v1
kind: Deployment
metadata:
  name: bird-classification-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: bird-classification-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: bird-classification-frontend
  template:
    metadata:
      labels:
        app: bird-classification-frontend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: frontend
        image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.frontend.port }}
          name: http
        env:
        - name: API_URL
          value: "http://bird-classification-api.aide-production.svc.cluster.local:80"
        - name: STREAMLIT_SERVER_PORT
          value: "{{ .Values.frontend.port }}"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_LOGGER_LEVEL
          value: "info"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://alloy.aide-monitoring.svc.cluster.local:4317"
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: {{ .Values.frontend.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: {{ .Values.frontend.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
