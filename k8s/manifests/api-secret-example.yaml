apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: aide-production
data:
  HTTP_PORT: "8000"                         # HTTP port the API server listens on
  WORKERS: "1"                              # Number of worker processes
  OTEL_EXPORTER_OTLP_ENDPOINT: ""          # OTLP endpoint for OpenTelemetry (e.g. http://alloy.aide-monitoring.svc.cluster.local:4317)
  OTEL_SERVICE_NAME: ""                     # Service name reported to the tracing backend
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: aide-production
type: Opaque
stringData:
  POSTGRES_USER: ""                         # PostgreSQL username
  POSTGRES_PASSWORD: ""                     # PostgreSQL password
  POSTGRES_HOST: ""                         # PostgreSQL host (e.g. 127.0.0.1 when using Cloud SQL proxy)
  POSTGRES_PORT: "5432"                     # PostgreSQL port
  POSTGRES_DB: ""                           # PostgreSQL database name
  KSERVE_MODEL_URL: ""                      # KServe inference endpoint URL for the bird classification model
  CLOUD_SQL_INSTANCE: ""                    # Cloud SQL connection name (project:region:instance)
