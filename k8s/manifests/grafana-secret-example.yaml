apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: aide-monitoring
type: Opaque
stringData:
  GF_PG_PASSWORD: ""                        # PostgreSQL password for Grafana
  GF_PG_USER: ""                            # PostgreSQL username for Grafana
  GF_PG_DB: ""                              # PostgreSQL database name used by Grafana
  GRAFANA_PG_HOST: ""                       # PostgreSQL host (e.g. 127.0.0.1 when using Cloud SQL proxy)
  GF_PG_PORT: "5432"                        # PostgreSQL port
  CLOUD_SQL_INSTANCE: ""                    # Cloud SQL connection name (project:region:instance)
