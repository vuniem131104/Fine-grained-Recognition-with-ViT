apiVersion: v1
kind: ServiceAccount
metadata:
  name: gar-cloud-sql-access-sa
  namespace: aide-production
  annotations:
    iam.gke.io/gcp-service-account: gar-cloud-sql-access-sa@project-2a55a756-9eba-4a36-8c6.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bird-classification-api
  namespace: aide-production
  labels:
    app: bird-classification-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bird-classification-api
  template:
    metadata:
      labels:
        app: bird-classification-api
    spec:
      serviceAccountName: gar-cloud-sql-access-sa
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/project-2a55a756-9eba-4a36-8c6/bird-classification/bird-classification-api:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: api-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "3Gi"
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
        args:
          - "--structured-logs"
          - "--auto-iam-authn"
          - "--port=5432"
          - "$(CLOUD_SQL_INSTANCE)"
        envFrom:
        - secretRef:
            name: api-secrets
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bird-classification-api
  namespace: aide-production
  labels:
    app: bird-classification-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: bird-classification-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bird-classification-api-ingress
  namespace: aide-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: bird-classification-api.aide-production.136.114.159.18.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bird-classification-api
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bird-classification-api-hpa
  namespace: aide-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bird-classification-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
