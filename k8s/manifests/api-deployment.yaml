apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: dev
data:
  HTTP_PORT: "8000"
  WORKERS: "2"
  KSERVE_MODEL_URL: "http://birds-model.dev.svc.cluster.local/v2/models/birds-model"
  POSTGRES_HOST: "127.0.0.1"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "mlflow_db"
  CLOUD_SQL_INSTANCE: "project-2a55a756-9eba-4a36-8c6:us-central1:test-instance"
---
# ServiceAccount for Cloud SQL Proxy with Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-sql-proxy-sa
  namespace: dev
  annotations:
    iam.gke.io/gcp-service-account: cloud-sql-proxy@project-2a55a756-9eba-4a36-8c6.iam.gserviceaccount.com
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: dev
type: Opaque
stringData:
  POSTGRES_USER: "vuniem"
  POSTGRES_PASSWORD: "Vuniem13104@"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bird-classification-api
  namespace: dev
  labels:
    app: bird-classification-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bird-classification-api
  template:
    metadata:
      labels:
        app: bird-classification-api
    spec:
      imagePullSecrets:
      - name: gar-pull-secret
      serviceAccountName: cloud-sql-proxy-sa
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/project-2a55a756-9eba-4a36-8c6/bird-classification/bird-classification-api:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: api-secrets
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "4000m"
            memory: "4Gi"
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
        args:
          - "--structured-logs"
          - "--auto-iam-authn"
          - "--port=5432"
          - "$(CLOUD_SQL_INSTANCE)"
        envFrom:
        - configMapRef:
            name: api-config
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bird-classification-api
  namespace: dev
  labels:
    app: bird-classification-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: bird-classification-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bird-classification-api-ingress
  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: bird-classification-api.local  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bird-classification-api
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bird-classification-api-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bird-classification-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
