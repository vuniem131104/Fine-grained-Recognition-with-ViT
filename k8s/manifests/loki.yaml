---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki
  namespace: aide-monitoring
  annotations:
    iam.gke.io/gcp-service-account: loki-sa@project-2a55a756-9eba-4a36-8c6.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: aide-monitoring
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        gcs:
          bucket_name: loki-grafana-chunks-bucket
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: gcs
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 168h   # 7 days

    compactor:
      retention_enabled: true
      delete_request_store: gcs

    ruler:
      alertmanager_url: http://localhost:9093
      storage:
        type: gcs
        gcs:
          bucket_name: loki-grafana-ruler-bucket
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: aide-monitoring
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  serviceName: loki-headless
  template:
    metadata:
      labels:
        app: loki
    spec:
      serviceAccountName: loki
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9096
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}  # WAL + ingester buffer only – chunks go to GCS
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: aide-monitoring
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3100
      targetPort: http
    - name: grpc
      port: 9096
      targetPort: grpc
  selector:
    app: loki
---
apiVersion: v1
kind: Service
metadata:
  name: loki-headless
  namespace: aide-monitoring
  labels:
    app: loki
spec:
  clusterIP: None
  ports:
    - name: http
      port: 3100
      targetPort: http
  selector:
    app: loki
