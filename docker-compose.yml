version: "3.9"

networks:
  aide1:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    networks:
      - aide1

  api:
    build:
      dockerfile: ./services/api/Dockerfile
      tags:
        - bird-classification-api:latest
    container_name: bird-api
    volumes:
      - type: bind
        source: ./services/api
        target: /app/services/api
    environment:
      HTTP_PORT: ${HTTP_PORT}
      WORKERS: ${WORKERS}
      KSERVE_MODEL_URL: ${KSERVE_MODEL_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "8000:8000"
    networks:
      - aide1

  frontend:
    build:
      dockerfile: ./services/frontend/Dockerfile
      tags:
        - bird-classification-frontend:latest
    container_name: bird-frontend
    volumes:
      - type: bind
        source: ./services/frontend
        target: /app/services/frontend
    environment:
      API_URL: ${API_URL}
    ports:
      - "8501:8501"
    networks:
      - aide1

volumes:
  postgres_data: