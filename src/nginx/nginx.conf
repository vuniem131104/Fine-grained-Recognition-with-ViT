events {}

http {
    # Increase max body size for image uploads
    client_max_body_size 50M;

    limit_req_zone $binary_remote_addr zone=ml_limit:10m rate=5r/s;

    # API Key validation - Add your API keys here
    map $http_x_api_key $is_valid_key {
        default 0;
        "vuniem131104" 1;
    }

    upstream serving_backend {
        least_conn;
        server serving:8000;
    }

    server {
        listen 80;

        location /predict {

            if ($is_valid_key = 0) {
                return 401;
            }

            limit_req zone=ml_limit burst=10 nodelay;

            proxy_pass http://serving_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint (no auth required)
        location /health {
            proxy_pass http://serving_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
