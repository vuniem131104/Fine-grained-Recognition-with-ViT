[client]
showErrorDetails = true
showWarningOnDirectExecution = false

[logger]
level = "info"

[theme]
primaryColor = "#667eea"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#e0e1ff"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
headless = true
maxUploadSize = 200
enableXsrfProtection = true
