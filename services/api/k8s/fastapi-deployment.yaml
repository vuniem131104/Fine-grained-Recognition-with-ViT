---
# FastAPI Pre/Post-processing Deployment (with HPA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-preprocessing
  labels:
    app: fastapi-preprocessing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-preprocessing
  template:
    metadata:
      labels:
        app: fastapi-preprocessing
    spec:
      containers:
        - name: fastapi
          image: fastapi-preprocessing:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: KSERVE_MODEL_URL
              value: "http://birds-model.default.svc.cluster.local/v1/models/birds-model:predict"
            - name: CLASSES_FILE
              value: "/app/services/serving/src/serving/classes.txt"
            - name: PORT
              value: "8000"
            - name: WORKERS
              value: "2"
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-preprocessing
spec:
  selector:
    app: fastapi-preprocessing
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
