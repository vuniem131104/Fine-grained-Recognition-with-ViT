apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: birds-model
  annotations:
    # Scale to zero configuration (Knative)
    autoscaling.knative.dev/min-scale: "0"
    autoscaling.knative.dev/max-scale: "5"
    # Scale down to zero after 300 seconds of no traffic
    autoscaling.knative.dev/scale-to-zero-pod-retention-period: "300s"
    # Target concurrent requests per pod
    autoscaling.knative.dev/target: "10"
spec:
  predictor:
    # Scale to zero settings
    minReplicas: 0
    maxReplicas: 5
    scaleTarget: 10
    scaleMetric: concurrency

    containers:
      - name: kserve-container
        image: birds-model:latest  # Built from MLflow model
        ports:
          - containerPort: 8080
            protocol: TCP
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              secretKeyRef:
                name: mlflow-secret
                key: tracking-uri
          - name: MLFLOW_EXPERIMENT_NAME
            value: "birds-classification"
          - name: MODEL_URI
            value: "models:/BirdsClassificationModel/1"
          - name: HTTP_PORT
            value: "8080"
          - name: WORKERS
            value: "1"
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /v1/models/birds-model
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /v1/models/birds-model
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
